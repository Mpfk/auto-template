name: PR Checks
# Thin caller. The real CI logic is maintained centrally in the Auto framework
# and referenced by major tag, so your repo receives CI updates automatically —
# for free, using only the default GITHUB_TOKEN. No sync engine, no token setup.
#
# To pin a specific release instead of tracking the major line, change @v1 to a
# full version tag (e.g. @v0.3.0). A breaking change ships as @v2; you opt in by
# bumping the ref.
#
# The workflow name ("PR Checks") is load-bearing: ci-issue-gate.yml triggers on
# `workflow_run` for it. Keep it stable.
on:
  pull_request:
    branches: [main]

jobs:
  checks:
    uses: Mpfk/auto/.github/workflows/reusable-pr-checks.yml@v1
    permissions:
      contents: read
      issues: read
      pull-requests: read
